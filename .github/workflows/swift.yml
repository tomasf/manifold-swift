# This workflow will build and test the Swift package.
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [macos-14, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: SwiftyLab/setup-swift@latest
    - name: Build
      run: swift build -v
    - name: Test
      run: swift test -v

  ios-simulator-build:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Build iOS Simulator
      run: xcodebuild build -scheme manifold-swift -destination 'generic/platform=iOS Simulator' -derivedDataPath .build/xcode-derived-data CODE_SIGNING_ALLOWED=NO
